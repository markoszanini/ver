services:
  - type: web
    name: sistema-casilda
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd sistema_casilda && gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: casilda-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.1"

databases:
  - name: casilda-db
    plan: free
