{% extends 'admin/base_site.html' %}

{% block content %}
<div style="background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; border: 1px solid #ccc;">
  <h2 style="color: #1b4f65; border-bottom: 2px solid #1b4f65; padding-bottom: 10px;"><i class="fas fa-file-pdf"></i> Generar Acta de Balance (Informe PDF)</h2>
  
  {% if error %}
    <div style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px;">
        <i class="fas fa-exclamation-triangle"></i> {{ error }}
    </div>
  {% endif %}

  <form method="POST" style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
    {% csrf_token %}
    <div>
        <label style="color:#333;"><b>Fecha Desde:</b></label><br>
        <input type="date" name="desde" required style="width:100%; padding:10px; border-radius:4px; border:1px solid #aaa;">
    </div>
    <div>
        <label style="color:#333;"><b>Fecha Hasta:</b></label><br>
        <input type="date" name="hasta" required style="width:100%; padding:10px; border-radius:4px; border:1px solid #aaa;">
    </div>
    <div>
        <label style="color:#333;"><b>Apicultor (Opcional):</b></label><br>
        <select name="apicultor" style="width:100%; padding:10px; border-radius:4px; border:1px solid #aaa; background: #fff;">
            <option value="">-- Todos los apicultores --</option>
            {% for a in apicultores %}
                <option value="{{ a.id_apicultor }}">{{ a.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div style="text-align:right; margin-top: 15px;">
        <a href="{% url 'apicultura:dashboard' %}" style="padding:10px 20px; color:#555; text-decoration:none; margin-right:10px; font-weight:bold;">Cancelar</a>
        <button type="submit" style="padding:12px 25px; background:#1b4f65; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:14px;"><i class="fas fa-cogs"></i> Procesar y Ver Reporte</button>
    </div>
  </form>
</div>
{% endblock %}
